global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'OrchestFlowAI-api'
    static_configs:
      - targets: ['OrchestFlowAI-api:8080']
    metrics_path: /metrics

  - job_name: 'OrchestFlowAI-worker'
    static_configs:
      - targets: ['OrchestFlowAI-worker:8081']
    metrics_path: /metrics

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
