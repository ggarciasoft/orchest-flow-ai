# docker-compose.app.yml — Application layer
# Starts the API, Worker, and Web frontend.
# Requires the infrastructure layer (postgres, redis).
#
# Run with infra:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up -d --build
#
# Or use the full stack file:
#   docker compose -f docker-compose.full.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: services/OrchestFlowAI.Api/Dockerfile
    ports:
      - "5080:8080"
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=OrchestFlowAI;Username=OrchestFlowAI;Password=OrchestFlowAI
      - Auth__JwtSigningKey=${JWT_KEY:-dev-signing-key-change-in-production-32chars}
      - Auth__JwtIssuer=${JWT_ISSUER:-OrchestFlowAI}
      - Auth__JwtAudience=${JWT_AUDIENCE:-OrchestFlowAI-web}
      - Storage__Root=/app/uploads
      - LLM__DefaultProvider=${LLM_PROVIDER:-fake}
      - LLM__DefaultModel=${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      - LLM__OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - REDIS_URL=redis:6379,abortConnect=false
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/v1/swagger.json"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: services/OrchestFlowAI.Worker/Dockerfile
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=OrchestFlowAI;Username=OrchestFlowAI;Password=OrchestFlowAI
      - Storage__Root=/app/uploads
      - LLM__DefaultProvider=${LLM_PROVIDER:-fake}
      - LLM__DefaultModel=${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      - LLM__OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - REDIS_URL=redis:6379,abortConnect=false
    volumes:
      - uploads:/app/uploads
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - DOCKER_BUILD=1
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
