# docker-compose.app.yml — Application layer
# Starts the API, Worker, and Web frontend.
# Requires the infrastructure layer to be running first.
#
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up -d
#
# Build and run:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up -d --build

services:
  api:
    build:
      context: .
      dockerfile: services/OrchestAI.Api/Dockerfile
    ports:
      - "5080:8080"
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=orchestai;Username=orchestai;Password=orchestai
      - Auth__JwtSigningKey=${JWT_KEY:-dev-signing-key-change-in-production-32chars}
      - Auth__JwtIssuer=${JWT_ISSUER:-orchestai}
      - Auth__JwtAudience=${JWT_AUDIENCE:-orchestai-web}
      - Storage__Root=/app/uploads
      - LLM__DefaultProvider=${LLM_PROVIDER:-fake}
      - LLM__DefaultModel=${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      - LLM__OpenAI__ApiKey=${OPENAI_API_KEY:-}
      - ASPNETCORE_ENVIRONMENT=Development
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/v1/swagger.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: services/OrchestAI.Worker/Dockerfile
    environment:
      - ConnectionStrings__Default=Host=postgres;Database=orchestai;Username=orchestai;Password=orchestai
      - Storage__Root=/app/uploads
      - LLM__DefaultProvider=${LLM_PROVIDER:-fake}
      - LLM__DefaultModel=${OPENAI_DEFAULT_MODEL:-gpt-4o-mini}
      - LLM__OpenAI__ApiKey=${OPENAI_API_KEY:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:5080
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
