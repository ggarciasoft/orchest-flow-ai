# docker-compose.yml — Infrastructure layer
# Starts PostgreSQL and Redis.
#
# Run infra only:
#   docker compose up -d
#
# Run everything (recommended):
#   docker compose -f docker-compose.full.yml up -d --build
#
# Or combine files manually:
#   docker compose -f docker-compose.yml -f docker-compose.app.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.app.yml -f docker-compose.observability.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: OrchestFlowAI
      POSTGRES_USER: OrchestFlowAI
      POSTGRES_PASSWORD: OrchestFlowAI
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U OrchestFlowAI"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
