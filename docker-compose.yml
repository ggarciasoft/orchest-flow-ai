  # Observability (optional profile)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    profiles: ["with-otel"]

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deploy/otel/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    profiles: ["with-otel"]

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    profiles: ["with-otel"]

volumes:
  postgres_data:
  uploads:
