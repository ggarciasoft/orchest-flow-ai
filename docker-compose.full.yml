# docker-compose.full.yml — Full stack (infra + app + observability)
#
# Starts everything:
#   - PostgreSQL, Redis
#   - API, Worker, Web frontend
#   - OpenTelemetry Collector, Prometheus, Grafana
#
# Usage:
#   cp .env.example .env   # edit secrets as needed
#   docker compose -f docker-compose.full.yml up -d --build
#
# Stop:
#   docker compose -f docker-compose.full.yml down
#
# URLs:
#   Web app:     http://localhost:3000
#   API/Swagger: http://localhost:5080/swagger
#   Prometheus:  http://localhost:9090
#   Grafana:     http://localhost:3001  (admin / admin, or GRAFANA_PASSWORD from .env)

include:
  - path: docker-compose.yml
  - path: docker-compose.app.yml
  - path: docker-compose.observability.yml
